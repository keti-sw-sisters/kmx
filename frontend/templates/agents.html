{% extends "base.html" %}
{% block content %}
<h2>자동화 도우미</h2>
<div class="card">
  <p>무엇을 하고 싶나요?</p>
  <div class="grid">
    <button class="btn secondary" onclick="setPrompt('이 CSV 데이터 등록해줘')">데이터 등록 도와줘</button>
    <button class="btn secondary" onclick="setPrompt('카탈로그 초안 만들어줘')">카탈로그 만들어줘</button>
    <button class="btn secondary" onclick="setPrompt('AI 분석해줘')">AI 분석해줘</button>
    <button class="btn secondary" onclick="setPrompt('API 초안 만들어줘')">API 만들어줘</button>
  </div>
</div>

<div class="card">
  <label>요청 입력</label>
  <textarea id="agentPrompt" rows="4" placeholder="이 CSV 데이터 등록해줘"></textarea>
  <button class="btn" onclick="runAgent()">실행</button>
</div>

<div class="card">
  <h3>결과</h3>
  <p id="agentStep1">-</p>
  <p id="agentStep2">-</p>
  <p id="agentStep3">-</p>
  <button class="btn" onclick="confirmRegister()">확인 후 등록</button>
  <p id="agentFinal"></p>
</div>
<script>
let onboardDraft = null;

function setPrompt(text) {
  document.getElementById("agentPrompt").value = text;
}

async function runAgent() {
  document.getElementById("agentStep1").textContent = "자동화 실행 중...";
  document.getElementById("agentStep2").textContent = "";
  document.getElementById("agentStep3").textContent = "";
  document.getElementById("agentFinal").textContent = "";
  try {
    const res = await fetch("/ui/api/analyze", { method: "POST" });
    const data = await res.json();
    onboardDraft = data;
    document.getElementById("agentStep1").textContent = "✔ 데이터 설명 생성 완료";
    document.getElementById("agentStep2").textContent = "✔ 데이터 의미 연결 완료";
    document.getElementById("agentStep3").textContent = "✔ 카탈로그 초안 생성 완료";
  } catch (e) {
    document.getElementById("agentStep1").textContent = "실패: 자동화 실행 오류";
  }
}

async function confirmRegister() {
  const finalText = document.getElementById("agentFinal");
  if (!onboardDraft) {
    finalText.textContent = "먼저 실행을 눌러 초안을 생성해 주세요.";
    return;
  }
  finalText.textContent = "등록 요청 중...";
  const params = new URLSearchParams({ owner_did: "did:kmx:owner:agent" });
  const sample = { temperature: 81.2, pressure: 1.1, vibration: 0.28 };
  try {
    const res = await fetch(`/agentic/auto-onboard?${params.toString()}`, {
      method: "POST",
      headers: { "Content-Type": "application/json" },
      body: JSON.stringify(sample)
    });
    const data = await res.json();
    if (!res.ok) throw new Error(data.detail || "등록 실패");
    finalText.textContent = `등록 완료: ${data.asset.asset_id}`;
  } catch (e) {
    finalText.textContent = `등록 실패: ${e.message}`;
  }
}
</script>
{% endblock %}
